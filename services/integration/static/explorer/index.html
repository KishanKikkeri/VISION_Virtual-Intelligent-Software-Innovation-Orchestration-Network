<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VISION — Platform Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<style>
  :root {
    --bg:        #14171c;
    --panel:     #1b1f27;
    --panel-2:   #21262f;
    --line:      #2c323d;
    --ink:       #d9dde3;
    --ink-dim:   #8892a0;
    --ink-faint: #5b6472;
    --ok:        #49c19a;
    --warn:      #e0a343;
    --err:       #e2604f;
    --accent:    #6e9bf4;
    --mono: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 14px; height: 100vh; overflow: hidden;
  }
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 18px;
    padding: 10px 18px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header .brand { font-weight: 600; letter-spacing: 0.02em; font-size: 13px; color: var(--ink); }
  header .brand small { display: block; font-weight: 400; color: var(--ink-faint); font-size: 11px; margin-top: 1px; }
  nav.tabs { display: flex; gap: 2px; margin-left: 12px; }
  nav.tabs button {
    background: transparent; border: none; color: var(--ink-dim); padding: 7px 14px;
    font-size: 12.5px; font-family: var(--sans); border-radius: 6px; cursor: pointer;
    letter-spacing: 0.01em;
  }
  nav.tabs button:hover { color: var(--ink); background: var(--panel-2); }
  nav.tabs button.active { color: var(--bg); background: var(--accent); font-weight: 600; }
  header .status-pill {
    margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
  .dot.bad { background: var(--err); }

  main { overflow: hidden; }
  .view { display: none; height: 100%; }
  .view.active { display: grid; }

  /* ── Explorer ───────────────────────────────────────────── */
  #view-explorer { grid-template-columns: 260px 1fr 320px; }
  .sidebar {
    border-right: 1px solid var(--line); background: var(--panel);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .search-box { padding: 12px; border-bottom: 1px solid var(--line); }
  .search-box input {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
    padding: 7px 10px; border-radius: 6px; font-size: 12.5px; font-family: var(--mono);
  }
  .search-box input:focus { outline: none; border-color: var(--accent); }
  .search-hint { font-size: 10.5px; color: var(--ink-faint); margin-top: 6px; }
  .wf-list { overflow-y: auto; flex: 1; padding: 6px; }
  .wf-item {
    padding: 9px 10px; border-radius: 7px; cursor: pointer; margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px; font-size: 12.5px;
  }
  .wf-item:hover { background: var(--panel-2); }
  .wf-item.selected { background: var(--panel-2); box-shadow: inset 2px 0 0 var(--accent); }
  .wf-item .name { font-weight: 500; }
  .wf-item .meta { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); }
  .match-node { font-size: 10.5px; color: var(--ink-faint); margin-left: 20px; margin-top: -2px; margin-bottom: 4px; font-family: var(--mono); }

  .canvas {
    overflow: auto; padding: 24px; display: flex; align-items: flex-start; justify-content: center;
    background:
      radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/22px 22px;
  }
  .canvas .mermaid { background: transparent; }
  .empty-state { margin: auto; color: var(--ink-faint); text-align: center; font-size: 13px; }

  .detail {
    border-left: 1px solid var(--line); background: var(--panel);
    overflow-y: auto; padding: 16px;
  }
  .detail h2 { font-size: 15px; margin: 0 0 2px; }
  .detail .subtitle { color: var(--ink-dim); font-size: 12px; margin-bottom: 14px; line-height: 1.5; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat { background: var(--panel-2); border-radius: 8px; padding: 9px 10px; }
  .stat .v { font-family: var(--mono); font-size: 17px; font-weight: 600; }
  .stat .k { font-size: 10.5px; color: var(--ink-faint); margin-top: 2px; }
  .section-title {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint);
    margin: 16px 0 8px; font-weight: 600;
  }
  table.routes { width: 100%; border-collapse: collapse; font-size: 11.5px; font-family: var(--mono); }
  table.routes td { padding: 4px 4px; border-bottom: 1px solid var(--line); color: var(--ink-dim); }
  table.routes td.outcome { color: var(--accent); }
  .finding { padding: 6px 8px; border-radius: 6px; font-size: 11.5px; margin-bottom: 6px; line-height: 1.4; }
  .finding.warn { background: rgba(224,163,67,0.1); color: var(--warn); }
  .finding.err { background: rgba(226,96,79,0.1); color: var(--err); }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-family: var(--mono); font-weight: 600; }
  .badge.ok { background: rgba(73,193,154,0.15); color: var(--ok); }
  .badge.bad { background: rgba(226,96,79,0.15); color: var(--err); }

  /* ── Traces ─────────────────────────────────────────────── */
  #view-traces { grid-template-columns: 1fr; padding: 24px; overflow-y: auto; }
  .traces-inner { max-width: 760px; margin: 0 auto; width: 100%; }
  .trace-search { display: flex; gap: 8px; margin-bottom: 18px; }
  .trace-search input {
    flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 12px; border-radius: 7px; font-family: var(--mono); font-size: 12.5px;
  }
  .trace-search button {
    background: var(--accent); color: var(--bg); border: none; padding: 9px 16px;
    border-radius: 7px; font-weight: 600; font-size: 12.5px; cursor: pointer;
  }
  .trace-item {
    border-left: 2px solid var(--line); padding: 4px 0 12px 16px; margin-left: 4px; position: relative;
  }
  .trace-item::before {
    content: ""; position: absolute; left: -5px; top: 6px; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent);
  }
  .trace-item .t-type { font-family: var(--mono); font-weight: 600; font-size: 12.5px; }
  .trace-item .t-meta { color: var(--ink-faint); font-size: 11px; margin-top: 2px; }
  .trace-item pre {
    background: var(--panel-2); border-radius: 6px; padding: 8px; font-size: 11px;
    margin-top: 6px; overflow-x: auto; color: var(--ink-dim);
  }

  /* ── Architecture dashboard ─────────────────────────────── */
  #view-arch { grid-template-columns: 1fr; padding: 24px; overflow-y: auto; }
  .arch-inner { max-width: 980px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 22px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px 20px; }
  .card h3 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-dim); }
  .gauge-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .gauge { flex: 1; min-width: 140px; }
  .gauge .bar-track { background: var(--panel-2); border-radius: 5px; height: 8px; overflow: hidden; margin: 6px 0; }
  .gauge .bar-fill { height: 100%; background: var(--ok); border-radius: 5px; }
  .gauge .label { font-size: 12px; color: var(--ink-dim); display: flex; justify-content: space-between; }
  .gauge .label b { font-family: var(--mono); color: var(--ink); }
  .tiers { display: flex; flex-direction: column; gap: 10px; }
  .tier-row { display: flex; align-items: center; gap: 10px; }
  .tier-label { width: 20px; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); text-align: right; }
  .tier-depts { display: flex; gap: 8px; flex-wrap: wrap; }
  .dept-chip {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    padding: 5px 10px; font-size: 11.5px; font-family: var(--mono);
  }
  .dept-chip.orphan { border-color: var(--warn); color: var(--warn); }
  .reg-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .reg-table td { padding: 6px 8px; border-bottom: 1px solid var(--line); }
  .reg-table td.n { font-family: var(--mono); text-align: right; color: var(--accent); }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">VISION Platform Explorer<small>Integration Service diagnostics — live</small></div>
    <nav class="tabs">
      <button data-tab="explorer" class="active">Workflows</button>
      <button data-tab="traces">Execution Traces</button>
      <button data-tab="arch">Architecture</button>
    </nav>
    <div class="status-pill"><span class="dot" id="status-dot"></span><span id="status-text">loading…</span></div>
  </header>

  <main>
    <!-- ══════════ Workflows tab ══════════ -->
    <div id="view-explorer" class="view active">
      <aside class="sidebar">
        <div class="search-box">
          <input id="search" type="text" placeholder="search workflows or node names…" autocomplete="off">
          <div class="search-hint">10 registered LangGraph workflows</div>
        </div>
        <div id="wf-list" class="wf-list"></div>
      </aside>
      <div class="canvas" id="canvas"><div class="empty-state">Select a workflow to render its graph.</div></div>
      <div class="detail" id="detail"><div class="empty-state" style="margin-top:40px;">No workflow selected.</div></div>
    </div>

    <!-- ══════════ Traces tab ══════════ -->
    <div id="view-traces" class="view">
      <div class="traces-inner">
        <div class="trace-search">
          <input id="trace-project-id" type="text" placeholder="project_id…">
          <button id="trace-fetch">Load traces</button>
        </div>
        <div id="trace-results"></div>
      </div>
    </div>

    <!-- ══════════ Architecture tab ══════════ -->
    <div id="view-arch" class="view">
      <div class="arch-inner" id="arch-inner">
        <div class="empty-state">Loading architecture data…</div>
      </div>
    </div>
  </main>
</div>

<script>
mermaid.initialize({ startOnLoad: false, theme: "dark", themeVariables: {
  darkMode: true, background: "#14171c", primaryColor: "#21262f", primaryTextColor: "#d9dde3",
  primaryBorderColor: "#2c323d", lineColor: "#5b6472", secondaryColor: "#1b1f27",
  tertiaryColor: "#1b1f27", fontFamily: "ui-monospace, monospace", fontSize: "12px",
}});

const API = "/platform";
let WORKFLOWS = {};   // name -> WorkflowReport
let SELECTED = null;

function badge(healthy) {
  return `<span class="badge ${healthy ? 'ok' : 'bad'}">${healthy ? 'HEALTHY' : 'ISSUES'}</span>`;
}

async function boot() {
  wireTabs();
  wireSearch();
  document.getElementById("trace-fetch").addEventListener("click", loadTraces);
  document.getElementById("trace-project-id").addEventListener("keydown", e => {
    if (e.key === "Enter") loadTraces();
  });

  try {
    const res = await fetch(`${API}/workflows`);
    WORKFLOWS = await res.json();
    renderWorkflowList(Object.keys(WORKFLOWS));
    const allHealthy = Object.values(WORKFLOWS).every(w => w.healthy);
    document.getElementById("status-dot").classList.toggle("bad", !allHealthy);
    document.getElementById("status-text").textContent =
      `${Object.values(WORKFLOWS).filter(w=>w.healthy).length}/${Object.keys(WORKFLOWS).length} workflows healthy`;
  } catch (e) {
    document.getElementById("status-text").textContent = "could not reach /platform/workflows";
    document.getElementById("status-dot").classList.add("bad");
  }

  loadArchitecture();
}

function wireTabs() {
  document.querySelectorAll("nav.tabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(`view-${btn.dataset.tab}`).classList.add("active");
    });
  });
}

function renderWorkflowList(names, query) {
  const list = document.getElementById("wf-list");
  list.innerHTML = "";
  const q = (query || "").trim().toLowerCase();

  names.sort().forEach(name => {
    const r = WORKFLOWS[name];
    const nodeMatches = q && r.reachable_nodes ? r.reachable_nodes.filter(n => n.includes(q) && !n.startsWith("__")) : [];
    const nameMatches = !q || name.toLowerCase().includes(q);
    if (q && !nameMatches && nodeMatches.length === 0) return;

    const item = document.createElement("div");
    item.className = "wf-item" + (name === SELECTED ? " selected" : "");
    item.innerHTML = `<span class="dot" style="background:${r.healthy ? 'var(--ok)' : 'var(--err)'}"></span>
                       <span class="name">${name}</span>
                       <span class="meta">${r.node_count}n / ${r.edge_count}e</span>`;
    item.addEventListener("click", () => selectWorkflow(name));
    list.appendChild(item);

    nodeMatches.slice(0, 4).forEach(n => {
      const m = document.createElement("div");
      m.className = "match-node";
      m.textContent = `↳ node: ${n}`;
      m.addEventListener("click", () => selectWorkflow(name));
      list.appendChild(m);
    });
  });

  if (list.children.length === 0) {
    list.innerHTML = `<div class="empty-state" style="margin-top:20px;">No workflows or nodes match "${query}".</div>`;
  }
}

function wireSearch() {
  document.getElementById("search").addEventListener("input", e => {
    renderWorkflowList(Object.keys(WORKFLOWS), e.target.value);
  });
}

async function selectWorkflow(name) {
  SELECTED = name;
  renderWorkflowList(Object.keys(WORKFLOWS), document.getElementById("search").value);

  const canvas = document.getElementById("canvas");
  canvas.innerHTML = `<div class="empty-state">Rendering ${name}…</div>`;
  try {
    const res = await fetch(`${API}/workflows/mermaid/${name}`);
    const body = await res.json();
    const id = "mmd-" + Math.random().toString(36).slice(2);
    canvas.innerHTML = `<div class="mermaid" id="${id}">${body.mermaid}</div>`;
    await mermaid.run({ nodes: [document.getElementById(id)] });
  } catch (e) {
    canvas.innerHTML = `<div class="empty-state">Could not render diagram: ${e}</div>`;
  }

  renderDetail(WORKFLOWS[name], name);
}

function renderDetail(r, name) {
  const detail = document.getElementById("detail");
  const routes = (r.conditional_routes || []).map(route =>
    Object.entries(route.outcomes || {}).map(([outcome, target]) =>
      `<tr><td>${route.source}</td><td class="outcome">${outcome}</td><td>→ ${target}</td></tr>`
    ).join("")
  ).join("");

  const parallel = (r.parallel_branches || []).map(p =>
    `<tr><td>${p.fan_out_node}</td><td class="outcome">${p.kind}</td><td>${(p.targets||[]).join(", ")}</td></tr>`
  ).join("");

  const findings = [
    ...(r.errors || []).map(m => `<div class="finding err">✗ ${m}</div>`),
    ...(r.warnings || []).map(m => `<div class="finding warn">⚠ ${m}</div>`),
  ].join("") || `<div style="color:var(--ink-faint); font-size:12px;">No findings — clean.</div>`;

  detail.innerHTML = `
    <h2>${name} ${badge(r.healthy)}</h2>
    <div class="subtitle">entry: <code>${r.entry_node ?? "—"}</code> · finish: <code>${r.finish_node ?? "—"}</code></div>
    <div class="stat-grid">
      <div class="stat"><div class="v">${r.node_count}</div><div class="k">nodes</div></div>
      <div class="stat"><div class="v">${r.edge_count}</div><div class="k">edges</div></div>
      <div class="stat"><div class="v">${r.graph_depth}</div><div class="k">graph depth</div></div>
      <div class="stat"><div class="v">${r.reachability_pct}%</div><div class="k">reachability</div></div>
      <div class="stat"><div class="v">${(r.interrupt_nodes||[]).length}</div><div class="k">interrupts</div></div>
      <div class="stat"><div class="v">${(r.parallel_branches||[]).length}</div><div class="k">parallel branches</div></div>
    </div>

    <div class="section-title">Routing table</div>
    ${routes ? `<table class="routes">${routes}</table>` : '<div style="color:var(--ink-faint); font-size:12px;">No conditional routes — linear/static-fanout pipeline.</div>'}

    <div class="section-title">Parallel branches</div>
    ${parallel ? `<table class="routes">${parallel}</table>` : '<div style="color:var(--ink-faint); font-size:12px;">None.</div>'}

    <div class="section-title">Findings</div>
    ${findings}

    <div class="section-title">Full docs</div>
    <div style="font-size:11.5px;"><a href="/docs/workflows/${name}.md" style="color:var(--accent);" target="_blank">docs/workflows/${name}.md ↗</a></div>
  `;
}

async function loadTraces() {
  const pid = document.getElementById("trace-project-id").value.trim();
  const results = document.getElementById("trace-results");
  if (!pid) { results.innerHTML = `<div class="empty-state">Enter a project_id above.</div>`; return; }
  results.innerHTML = `<div class="empty-state">Loading…</div>`;
  try {
    const res = await fetch(`${API}/traces/${encodeURIComponent(pid)}`);
    const body = await res.json();
    if (!body.events || body.events.length === 0) {
      results.innerHTML = `<div class="empty-state">${body.note ? body.note : "No recorded audit events for this project yet."}</div>`;
      return;
    }
    results.innerHTML = body.events.map(ev => `
      <div class="trace-item">
        <div class="t-type">${ev.event_type}</div>
        <div class="t-meta">${ev.recorded_at || "—"} · ${ev.actor_type}:${ev.actor_id}${ev.entity_type ? " · " + ev.entity_type + (ev.entity_id ? "#"+ev.entity_id : "") : ""}</div>
        ${ev.payload && Object.keys(ev.payload).length ? `<pre>${JSON.stringify(ev.payload, null, 2)}</pre>` : ""}
      </div>
    `).join("");
  } catch (e) {
    results.innerHTML = `<div class="empty-state">Could not load traces: ${e}</div>`;
  }
}

async function loadArchitecture() {
  const el = document.getElementById("arch-inner");
  try {
    const [depRes, regRes, readyRes] = await Promise.all([
      fetch(`${API}/dependencies`), fetch(`${API}/registry`), fetch(`${API}/readiness`),
    ]);
    const dep = await depRes.json(), reg = await regRes.json(), ready = await readyRes.json();

    const gauges = (ready.categories || []).map(c => `
      <div class="gauge">
        <div class="label"><span>${c.name}</span><b>${c.score.toFixed(1)}%</b></div>
        <div class="bar-track"><div class="bar-fill" style="width:${c.score}%; background:${c.score >= 90 ? 'var(--ok)' : c.score >= 70 ? 'var(--warn)' : 'var(--err)'}"></div></div>
      </div>`).join("");

    const tiers = (dep.phase_tiers || []).map((tier, i) => `
      <div class="tier-row">
        <div class="tier-label">${i+1}</div>
        <div class="tier-depts">${tier.map(d => `<span class="dept-chip">${d}</span>`).join("")}</div>
      </div>`).join("");

    const orphanChips = (dep.orphan_departments || []).map(d => `<span class="dept-chip orphan">${d} (no upstream dep)</span>`).join(" ");

    const deptChips = (reg.departments || []).sort().map(d => `<span class="dept-chip">${d}</span>`).join(" ");

    el.innerHTML = `
      <div class="card">
        <h3>Platform readiness</h3>
        <div class="gauge-row">${gauges || '<div class="empty-state">No readiness data.</div>'}</div>
        <div style="margin-top:14px; font-size:12px; color:var(--ink-dim);">Overall: <b style="font-family:var(--mono); color:var(--ink);">${(ready.overall||0).toFixed(1)}%</b></div>
      </div>

      <div class="card">
        <h3>Department dependency map (phase tiers)</h3>
        <div class="tiers">${tiers}</div>
        ${orphanChips ? `<div style="margin-top:12px;">${orphanChips}</div>` : ""}
        ${dep.has_cycle ? `<div class="finding err" style="margin-top:10px;">⚠ dependency cycle detected</div>` : ""}
      </div>

      <div class="card">
        <h3>Agent registry — ${reg.total_agents || 0}/${reg.expected_agents || 0} agents ${badge(reg.passed)}</h3>
        <div class="tier-depts">${deptChips || "—"}</div>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="empty-state">Could not load architecture data: ${e}</div>`;
  }
}

boot();
</script>
</body>
</html>
